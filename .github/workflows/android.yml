name: Android CI — Build & Release APK

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# ── Concurrency guard (cancel stale runs on same branch) ──────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required for AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Cache Gradle dependencies for faster subsequent runs
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Grant execute permission to Gradle wrapper
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. Run lint (non-blocking — reports uploaded as artifact)
      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      # 6. Run unit tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # 7. Build the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 8. Upload the debug APK as a downloadable artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CustomKeyboard-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # 9. Upload lint report
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      # 10. Upload test results
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: app/build/reports/tests/
          retention-days: 14

  # ── Optional: build release APK (unsigned) on tags ──────────────────────────
  release:
    name: Build Release APK (unsigned)
    runs-on: ubuntu-latest
    needs: build
    # Only run on version tags like v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CustomKeyboard-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
