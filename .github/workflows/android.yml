name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: |
          gradle :app:assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== HATA ==="
            grep -E "error:|Error|FAILED|Exception" /tmp/build.log | tail -30
            exit 1
          fi

      - name: Upload APK to Release
        if: success()
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          TAG="v1.0.${{ github.run_number }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          REPO="${{ github.repository }}"

          RELEASE=$(curl -sf -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"CustomKeyboard $TAG\",\"body\":\"Debug APK - Build #${{ github.run_number }}\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/$REPO/releases")

          UPLOAD_URL=$(echo "$RELEASE" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

          curl -sf -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK" \
            "${UPLOAD_URL}?name=CustomKeyboard-debug.apk"

          echo "Release: https://github.com/$REPO/releases/tag/$TAG"
