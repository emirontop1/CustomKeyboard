name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1
        continue-on-error: true

      - name: Show Gradle error if failed
        run: |
          echo "=== BUILD OUTPUT ==="
          find . -name "*.log" -path "*/build/*" | head -5 | xargs cat 2>/dev/null || true
          echo "=== APK CHECK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== LAST ERRORS ==="
          find . -name "*.txt" -path "*/build/*" 2>/dev/null | head -3 | xargs grep -l "error\|Error\|FAILED" 2>/dev/null | head -2 | xargs cat 2>/dev/null | tail -50 || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "CustomKeyboard v1.0.${{ github.run_number }}"
          body: "Debug APK - Build #${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
