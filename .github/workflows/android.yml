name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK to GitHub Release
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          TAG="v1.0.${{ github.run_number }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          echo "APK exists: $(ls -lh $APK_PATH)"

          # Create release
          RELEASE_JSON=$(curl -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"CustomKeyboard $TAG\",\"body\":\"Debug APK - Build #${{ github.run_number }}\n\nKurulum:\\n1. APK'yi indir\\n2. Bilinmeyen kaynaklara izin ver\\n3. Yükle ve etkinleştir\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/$REPO/releases")

          echo "Release response: $RELEASE_JSON"

          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['upload_url'].split('{')[0])")
          echo "Upload URL: $UPLOAD_URL"

          # Upload APK binary
          UPLOAD_RESULT=$(curl -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK_PATH" \
            "${UPLOAD_URL}?name=CustomKeyboard-debug.apk&label=CustomKeyboard+Debug+APK")

          echo "Upload result: $UPLOAD_RESULT"
          echo "Download URL: $(echo $UPLOAD_RESULT | python3 -c "import sys,json; print(json.load(sys.stdin).get('browser_download_url','ERROR'))")"
