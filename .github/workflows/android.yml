name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create Release and Upload APK
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK path: $APK"
          
          # Create release
          RELEASE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"v1.0.${{ github.run_number }}\",\"name\":\"CustomKeyboard v1.0.${{ github.run_number }}\",\"body\":\"Debug APK - Build #${{ github.run_number }}\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          
          UPLOAD_URL=$(echo $RELEASE | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('upload_url','').replace('{?name,label}',''))")
          echo "Upload URL: $UPLOAD_URL"
          
          # Upload APK
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK" \
            "${UPLOAD_URL}?name=CustomKeyboard-debug.apk"
          
          echo "Done!"
