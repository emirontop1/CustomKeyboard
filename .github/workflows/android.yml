name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD FAILED - Last 80 lines ==="
            tail -80 /tmp/gradle.log
            exit 1
          fi

      - name: Upload APK to Release
        if: success()
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          TAG="v1.0.${{ github.run_number }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          REPO="${{ github.repository }}"

          RELEASE=$(curl -sf -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"CustomKeyboard $TAG\",\"body\":\"Debug APK\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/$REPO/releases")

          UPLOAD_URL=$(echo "$RELEASE" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

          curl -sf -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK" \
            "${UPLOAD_URL}?name=CustomKeyboard-debug.apk"

          echo "Release: https://github.com/$REPO/releases/tag/$TAG"
